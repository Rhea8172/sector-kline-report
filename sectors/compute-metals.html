          text: sells.map(() => "P"), textposition: "bottom center", name: "卖点P",
          textfont: {color: "#166534", size: 15, family: "Arial Black, sans-serif"},
          marker: {symbol: "triangle-down", color: "#16a34a", size: 16, line: {color: "white", width: 2}},
          xaxis: "x", yaxis: "y", hovertemplate: "卖点 P<br>%{x}<br>%{y:.2f}<extra></extra>"
        });
        traces.push({
          type: "scatter", mode: "markers+text",
          x: buys.map(item => item.date), y: buys.map(() => 1),
          text: buys.map(() => "C"), textposition: "top center", name: "信号轨买点C",
          textfont: {color: "#991b1b", size: 16, family: "Arial Black, sans-serif"},
          marker: {symbol: "triangle-up", color: "#dc2626", size: 18, line: {color: "white", width: 2}},
          xaxis: "x", yaxis: "y3", hovertemplate: "买点 C<br>%{x}<extra></extra>"
        });
        traces.push({
          type: "scatter", mode: "markers+text",
          x: sells.map(item => item.date), y: sells.map(() => 0),
          text: sells.map(() => "P"), textposition: "bottom center", name: "信号轨卖点P",
          textfont: {color: "#166534", size: 16, family: "Arial Black, sans-serif"},
          marker: {symbol: "triangle-down", color: "#16a34a", size: 18, line: {color: "white", width: 2}},
          xaxis: "x", yaxis: "y3", hovertemplate: "卖点 P<br>%{x}<extra></extra>"
        });
      }
      const volumeColors = s.close.map((c, i) => c >= s.open[i] ? "rgba(214,39,40,.55)" : "rgba(44,160,44,.55)");
      const volume = {
        type: "bar", x: s.dates, y: s.volume.map(v => v / 10000),
        marker: {color: volumeColors}, name: "成交量(万股)", xaxis: "x", yaxis: "y2"
      };
      traces.push(volume);
      const layout = {
        title: `${meta.name} (${meta.symbol}) 近一年日K线`,
        dragmode: "zoom",
        showlegend: true,
        margin: {l: 58, r: 28, t: 54, b: 42},
        xaxis: {rangeslider: {visible: true}, type: "date"},
        yaxis: {domain: [0.38, 1], title: "价格"},
        yaxis2: {domain: [0.16, 0.32], title: "成交量(万股)"},
        yaxis3: {
          domain: [0, 0.10],
          title: "C/P",
          range: [-0.6, 1.6],
          tickmode: "array",
          tickvals: [0, 1],
          ticktext: ["P", "C"],
          showgrid: false,
          zeroline: false
        },
        plot_bgcolor: "#ffffff",
        paper_bgcolor: "#ffffff"
      };
      Plotly.react("chart", traces, layout, {responsive:true, displaylogo:false});
    }
    select.addEventListener("change", () => render(select.value));
    strategySelect.addEventListener("change", () => render(select.value));
    maToggles.forEach(toggle => toggle.addEventListener("change", () => render(select.value)));
    const requested = new URLSearchParams(window.location.search).get("stock");
    if (requested && series[requested]) select.value = requested;
    render(select.value);
  </script>
</body>
</html>
