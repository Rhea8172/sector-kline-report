    const select = document.getElementById("stock");
    const strategySelect = document.getElementById("strategy");
    const summary = document.getElementById("summary");
    const maToggles = Array.from(document.querySelectorAll(".ma-toggle"));
    function num(v) { return Number.isFinite(Number(v)) ? Number(v) : null; }
    function fmt(v, digits = 2) {
      const n = num(v);
      return n === null ? "--" : n.toFixed(digits);
    }
    function fmtPct(v) {
      const n = num(v);
      return n === null ? "--" : `${n >= 0 ? "+" : ""}${n.toFixed(2)}%`;
    }
    function cls(v) { return v > 0 ? "up" : (v < 0 ? "down" : "flat"); }
    function render(symbol) {
      const meta = stocks.find(s => s.symbol === symbol);
      const s = series[symbol];
      summary.innerHTML = `
        <div class="chip"><strong>${meta.name}</strong>${meta.symbol}</div>
        <div class="chip"><strong>最新收盘价</strong>${fmt(meta.latest)}</div>
        <div class="chip"><strong>最新日涨跌幅</strong><span class="${cls(num(meta.pct) || 0)}">${fmtPct(meta.pct)}</span></div>
        <div class="chip"><strong>交易日数</strong>${s.dates.length}</div>`;
      const traces = [];
      const candles = {
        type: "candlestick",
        x: s.dates, open: s.open, high: s.high, low: s.low, close: s.close,
        increasing: {line: {color: "#d62728"}, fillcolor: "#d62728"},
        decreasing: {line: {color: "#2ca02c"}, fillcolor: "#2ca02c"},
        name: `${meta.name} K线`,
        xaxis: "x", yaxis: "y"
      };
      traces.push(candles);
      const maMeta = {
        ma5: ["MA5", "#7c3aed"],
        ma20: ["MA20", "#1d4ed8"],
        ma60: ["MA60", "#f97316"]
      };
      for (const toggle of maToggles) {
        if (!toggle.checked) continue;
        const [name, color] = maMeta[toggle.value];
        traces.push({
          type: "scatter", mode: "lines", x: s.dates, y: s[toggle.value],
          name, line: {color, width: 1.35}, xaxis: "x", yaxis: "y",
          hovertemplate: `${name}: %{y:.2f}<extra></extra>`
        });
      }
      if (strategySelect.value !== "none") {
        const signals = strategySignals[symbol] || [];
        const buys = signals.filter(item => item.type === "buy");
        const sells = signals.filter(item => item.type === "sell");
        traces.push({
          type: "scatter", mode: "markers+text", x: buys.map(item => item.date), y: buys.map(item => item.price),
          text: buys.map(() => "C"), textposition: "top center", name: "买点C",
          marker: {symbol: "triangle-up", color: "#dc2626", size: 12, line: {color: "white", width: 1}},
          xaxis: "x", yaxis: "y", hovertemplate: "买点 C<br>%{x}<br>%{y:.2f}<extra></extra>"
        });
        traces.push({
          type: "scatter", mode: "markers+text", x: sells.map(item => item.date), y: sells.map(item => item.price),
          text: sells.map(() => "P"), textposition: "bottom center", name: "卖点P",
          marker: {symbol: "triangle-down", color: "#16a34a", size: 12, line: {color: "white", width: 1}},
          xaxis: "x", yaxis: "y", hovertemplate: "卖点 P<br>%{x}<br>%{y:.2f}<extra></extra>"
        });
      }
      const volumeColors = s.close.map((c, i) => c >= s.open[i] ? "rgba(214,39,40,.55)" : "rgba(44,160,44,.55)");
      const volume = {
        type: "bar", x: s.dates, y: s.volume.map(v => v / 10000),
        marker: {color: volumeColors}, name: "成交量(万股)", xaxis: "x", yaxis: "y2"
      };
      traces.push(volume);
      const layout = {
        title: `${meta.name} (${meta.symbol}) 近一年日K线`,
        dragmode: "zoom",
        showlegend: true,
        margin: {l: 58, r: 28, t: 54, b: 42},
        xaxis: {rangeslider: {visible: true}, type: "date"},
        yaxis: {domain: [0.28, 1], title: "价格"},
        yaxis2: {domain: [0, 0.2], title: "成交量(万股)"},
        plot_bgcolor: "#ffffff",
        paper_bgcolor: "#ffffff"
      };
      Plotly.react("chart", traces, layout, {responsive:true, displaylogo:false});
    }
    select.addEventListener("change", () => render(select.value));
    strategySelect.addEventListener("change", () => render(select.value));
    maToggles.forEach(toggle => toggle.addEventListener("change", () => render(select.value)));
    const requested = new URLSearchParams(window.location.search).get("stock");
    if (requested && series[requested]) select.value = requested;
    render(select.value);
  </script>
